<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1.5rem;min-height:100vh;text-transform:uppercase}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.toolbar input{flex:1;min-width:180px;font-size:14px;padding:8px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;text-transform:uppercase}
.btn-black{font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;background:#1a1a1a;color:#fff;cursor:pointer;border:none;text-transform:uppercase}
.btn-green{font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;background:#3a6a1a;color:#fff;cursor:pointer;border:none;text-transform:uppercase}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #ddd;padding:22px;width:min(520px,95vw);max-height:88vh;overflow-y:auto;display:flex;flex-direction:column}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-scroll{flex:1;overflow-y:auto;padding-right:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #eee;flex-shrink:0}
.field{margin-bottom:14px}
.field label{font-size:12px;color:#555;display:block;margin-bottom:5px;font-weight:600}
.field input,.field textarea{width:100%;font-size:14px;padding:8px;border:1px solid #ccc;border-radius:8px;font-family:inherit}
.field textarea{resize:vertical;min-height:90px}
.field textarea.tall{min-height:120px}
.btn-save{font-size:13px;padding:7px 16px;border-radius:8px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:700;border:none;text-transform:uppercase}
.btn-cancel{font-size:12px;padding:5px 12px;border-radius:8px;background:#f0f0f0;color:#555;cursor:pointer;border:1px solid #ccc;text-transform:uppercase}
.btn-delete-meal{font-size:12px;padding:5px 12px;border-radius:8px;background:#fff;color:#c0392b;cursor:pointer;border:1px solid #e74c3c;text-transform:uppercase;font-weight:700}
.upload-zone{border:2px dashed #ccc;border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer}
.upload-zone:hover{border-color:#888}
.upload-zone input[type=file]{display:none}
.empty{font-size:14px;color:#888;text-align:center;padding:2rem 0}
.meal-card{max-width:780px;margin:0 auto 10px auto}
.meal-inner{padding:14px 16px}
/* collapsible section */
.section-toggle{font-size:12px;font-weight:700;margin-bottom:8px;color:#1a1a1a;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.section-toggle:hover{opacity:0.75}
/* ingredient tag input */
.tag-input-wrapper{border:1px solid #ccc;border-radius:8px;padding:6px 8px;background:#fff;min-height:44px;cursor:text;display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start}
.tag-item{background:#e8e8e8;border-radius:6px;padding:4px 8px;font-size:13px;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.tag-item button{background:none;border:none;cursor:pointer;font-size:14px;padding:0;line-height:1;color:#555}
.tag-item button:hover{color:#c00}
.meal-name-input{font-family:"Lora",Georgia,serif;font-size:15px;text-transform:none}
.meal-name{font-family:"Lora",Georgia,serif;font-size:20px;font-weight:600;text-transform:none;letter-spacing:0.01em}
#tag-field{border:none;outline:none;font-size:14px;padding:4px;min-width:160px;flex:1;background:transparent;font-family:inherit;text-transform:uppercase}
</style>

<body>
<div class="toolbar">
  <input type="text" id="search" placeholder="Search meals or ingredients..." oninput="render()">
  <button class="btn-black" onclick="openAddMeal()">+ New Meal</button>
  <button class="btn-green" onclick="downloadBackup()">&#8595; Download Backup</button>
  <button class="btn-green" onclick="document.getElementById('import-file').click()">&#8593; Import Backup</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(this)">
</div>

<div id="sync-bar" style="background:#fce7f3;border-bottom:1px solid #f9a8d4;padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;margin-bottom:1rem;">
  <button onclick="pushToGoogle()" style="background:#1a56db;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px">Sync ↑ Push</button>
  <button onclick="pullFromGoogle()" style="background:#3a6a1a;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px">Sync ↓ Pull</button>
  <span id="sync-status" style="font-size:11px;font-weight:600;font-family:monospace;"></span>
</div>
<div id="meal-list"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
var STORAGE_KEY = 'meal_log_v1';

// ── tag input helpers ────────────────────────────────────────────────────────
var currentTags = [];

function renderTags() {
  var wrapper = document.getElementById('tag-input-wrapper');
  if (!wrapper) return;
  var input = document.getElementById('tag-field');
  wrapper.innerHTML = '';
  currentTags.forEach(function(tag, i) {
    var span = document.createElement('span');
    span.className = 'tag-item';
    span.innerHTML = esc(tag) + '<button type="button" onclick="removeTag(' + i + ')" title="Remove">&#x2715;</button>';
    wrapper.appendChild(span);
  });
  wrapper.appendChild(input);
}

function removeTag(i) {
  currentTags.splice(i, 1);
  renderTags();
}

function addTagFromInput() {
  var input = document.getElementById('tag-field');
  if (!input) return;
  var val = input.value.trim();
  if (val) {
    currentTags.push(val);
    input.value = '';
    renderTags();
  }
}

function tagKeydown(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTagFromInput();
  } else if (e.key === 'Backspace') {
    var input = document.getElementById('tag-field');
    if (input.value === '' && currentTags.length > 0) {
      currentTags.pop();
      renderTags();
    }
  }
}

function buildTagInputHTML() {
  return '<div class="tag-input-wrapper" id="tag-input-wrapper" onclick="document.getElementById(\'tag-field\').focus()">' +
    '<input type="text" id="tag-field" placeholder="" onkeydown="tagKeydown(event)" onblur="addTagFromInput()">' +
    '</div>';
}

function tagsToString(tags) { return tags.join(', '); }

function stringToTags(str) {
  if (!str) return [];
  return str.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
}

// ── data layer ───────────────────────────────────────────────────────────────
function loadData() {
  try { var s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return null;
}

function saveData(d) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  } catch(e) {
    try {
      var slim = JSON.parse(JSON.stringify(d));
      slim.meals.forEach(function(m) { m.photo = ''; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
      alert('Storage almost full - photos not saved. Use Download Backup to save everything.');
    } catch(e2) {}
  }
}

function downloadBackup() {
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meal_log_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importBackup(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!imported.meals || !Array.isArray(imported.meals)) { alert('Invalid backup file.'); return; }
      if (!confirm('This will replace all current data with the backup. Continue?')) return;
      data = imported;
      data.meals.forEach(function(m) {
        if (!m.instructions) m.instructions = '';
        if (m.hasRecipe === undefined) m.hasRecipe = !!m.instructions;
        if (!m.photo) m.photo = '';
        if (!m.entries) m.entries = [];
        if (!m.ingredients) m.ingredients = [];
        if (!m.notes) m.notes = [];
      });
      data.meals.forEach(function(m) {
        if (openMeals[m.id] === undefined) openMeals[m.id] = false;
      });
      save(); render();
      alert('Backup imported successfully!');
    } catch(err) { alert('Could not read file. Make sure it is a valid meal log backup JSON file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function compressImage(file, cb) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var MAX = 900, w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

var PALETTES = [
  {bg:'#fdf8f2',border:'#e0d5c5',text:'#3a2e1e'}
];

function getPalette(idx) { return PALETTES[0]; }

var SEED = {"meals":[
  {"id":1,"name":"Chicken noodle soup","hasRecipe":true,"instructions":"shred chicken: Put 2 large breasts in pot and add water to cover by 1/4\". Add 2 tsp salt. Once it reaches simmer on med heat, turn heat off and quickly cover with lid & let sit 15 minutes. remove from liquid and let sit another 10-20 minutes.\n\n24 oz package Reames Egg Noodles = (14) 48g servings. Take 48g noodles & add to pot with 1 serving bone broth, 200 mL water, 1 carrot, 1 rib celery, 25g yellow onion, 2 cups water & 1 1/4 tsp better than bouillon roasted chicken base reduced sodium. simmer for 15 minutes. add 100g shredded chicken & scallions at the end.\n","photo":"",
   "cronDate":"2026-03-25",
   "ingredients":["60g kefir","1 egg","3 mandarins","1/4 tsp nosalt"],
   "notes":[]},
  {"id":2,"name":"Thin crust pizza","hasRecipe":false,"instructions":"","photo":"",
   "cronDate":"2026-04-01",
   "ingredients":["1/4+1/8 tsp nosalt","60ml kefir","3 mandarins","1 egg"],
   "notes":[]}
],"nextMealId":6,"nextEntryId":6};

var stored = loadData();

if (stored) {
  stored.meals.forEach(function(m) {
    if (!m.instructions) m.instructions = '';
    if (m.hasRecipe === undefined) m.hasRecipe = !!m.instructions;
    if (!m.photo) m.photo = '';
    if (!m.ingredients) {
      if (m.entries && m.entries.length > 0) {
        var last = m.entries[m.entries.length - 1];
        m.cronDate = last.date;
        m.ingredients = stringToTags(last.ingredients);
      } else {
        m.ingredients = [];
      }
    }
    if (!m.notes) m.notes = [];
    if (!m.cronDate) m.cronDate = '';
    delete m.entries;
  });
}

var data = stored || SEED;
data.meals.forEach(function(m) {
  if (!m.instructions) m.instructions = '';
  if (m.hasRecipe === undefined) m.hasRecipe = !!m.instructions;
  if (!m.photo) m.photo = '';
  if (!m.ingredients) m.ingredients = [];
  if (!m.notes) m.notes = [];
  if (!m.cronDate) m.cronDate = '';
});

var openMeals = {};
data.meals.forEach(function(m) { openMeals[m.id] = false; });

try {
  var savedOpen = localStorage.getItem('meal_log_open_state');
  if (savedOpen) openMeals = JSON.parse(savedOpen);
} catch(e) {}

function saveOpenState() {
  try { localStorage.setItem('meal_log_open_state', JSON.stringify(openMeals)); } catch(e) {}
}

function save() { saveData(data); }

function fmtDate(d) {
  if (!d) return '';
  var parts = d.split('-');
  return parseInt(parts[1]) + '/' + parseInt(parts[2]) + '/' + parts[0];
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function today() { return new Date().toISOString().split('T')[0]; }

function render() {
  var q = (document.getElementById('search').value || '').toLowerCase().trim();
  var list = document.getElementById('meal-list');
  var filtered = data.meals.filter(function(m) {
    if (!q) return true;
    if (m.name.toLowerCase().indexOf(q) >= 0) return true;
    if (m.instructions && m.instructions.toLowerCase().indexOf(q) >= 0) return true;
    if (m.ingredients.some(function(ing) { return ing.toLowerCase().indexOf(q) >= 0; })) return true;
    return m.notes.some(function(n) { return n.text.toLowerCase().indexOf(q) >= 0; });
  });
  if (!filtered.length) { list.innerHTML = '<div class="empty">No meals found.</div>'; return; }
  filtered.sort(function(a,b){ return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : a.name.toLowerCase() > b.name.toLowerCase() ? 1 : 0; });

  var editBtnBlack = 'font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer;border:none;background:#1a1a1a;color:#fff;text-transform:uppercase';
  var deleteBtnRed = 'font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer;background:#fff;color:#c0392b;border:1px solid #e74c3c;text-transform:uppercase';

  var html = '';
  filtered.forEach(function(m, i) {
    var pal = getPalette(i);
    var isOpen = openMeals[m.id];
    var matchIngr = q && m.name.toLowerCase().indexOf(q) < 0;
    var miniStyle = 'font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;cursor:pointer;border:1px solid rgba(0,0,0,0.25);background:rgba(255,255,255,0.5);color:#1a1a1a;text-transform:uppercase;white-space:nowrap';

    html += '<div class="meal-card" style="background:' + pal.bg + ';border:1px solid ' + pal.border + ';border-radius:12px;overflow:hidden">';

    // ── Header row ──────────────────────────────────────────────────────────
    html += '<div style="display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;flex-wrap:wrap" onclick="toggleMeal(' + m.id + ')">';
    html += '<span style="font-size:14px;color:#1a1a1a;flex-shrink:0">' + (isOpen ? '&#9660;' : '&#9654;') + '</span>';
    html += '<span class="meal-name" style="flex:1;color:#1a1a1a;min-width:120px">' + esc(m.name) + '</span>';

    html += '<div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap" onclick="event.stopPropagation()">';
    html += '<button style="' + miniStyle + '" onclick="openMealEditor(' + m.id + ')">' + (m.photo ? '&#128444; Photo' : '+ Photo') + '</button>';
    if (!m.hasRecipe) {
      html += '<button style="' + miniStyle + '" onclick="addRecipe(' + m.id + ')">+ Recipe</button>';
    }
    html += '<button style="' + miniStyle + '" onclick="openMealEditor(' + m.id + ')">+ Ingredients</button>';
    html += '<button style="' + miniStyle + '" onclick="openAddNote(' + m.id + ');if(!openMeals[' + m.id + ']){openMeals[' + m.id + ']=true;saveOpenState();}">+ Note</button>';
    html += '</div>';

    html += '<div style="display:flex;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">';
    html += '<button style="' + editBtnBlack + '" onclick="openMealEditor(' + m.id + ')">EDIT</button>';
    html += '<button style="' + deleteBtnRed + '" onclick="deleteMeal(' + m.id + ')">DELETE</button>';
    html += '</div>';
    html += '</div>'; // end header row

    // ── Expanded body ────────────────────────────────────────────────────────
    if (isOpen) {
      html += '<div class="meal-inner" style="border-top:1px solid rgba(0,0,0,0.1)">';

      if (m.photo) {
        html += '<div style="margin-bottom:14px;background:#f0f0ec;border-radius:10px;overflow:hidden;text-align:center">';
        html += '<img src="' + esc(m.photo) + '" style="max-width:100%;max-height:300px;object-fit:contain;display:block;margin:0 auto">';
        html += '</div>';
      }

      if (m.ingredients && m.ingredients.length > 0) {
        html += '<div style="background:rgba(255,255,255,0.55);border-radius:8px;padding:12px 14px;margin-bottom:14px;border:1px solid rgba(0,0,0,0.1)">';
        html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;color:#1a1a1a">';
        html += '<span>INGREDIENTS</span>';
        if (m.cronDate) html += '<span style="font-size:11px;font-weight:600;opacity:0.55;margin-left:auto;color:#1a1a1a">CRONOMETER: ' + fmtDate(m.cronDate) + '</span>';
        html += '</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
        m.ingredients.forEach(function(ing) {
          var hi = q && ing.toLowerCase().indexOf(q) >= 0 && matchIngr;
          html += '<span style="font-size:13px;background:' + (hi?'#dbeafe':'rgba(255,255,255,0.7)') + ';border:1px solid ' + (hi?'#2563eb':'rgba(0,0,0,0.15)') + ';border-radius:8px;padding:4px 10px;color:' + (hi?'#1e3a8a':'#1a1a1a') + ';text-transform:uppercase">' + esc(ing) + '</span>';
        });
        html += '</div></div>';
      }

      if (m.hasRecipe) {
        html += '<div style="background:rgba(255,255,255,0.55);border-radius:8px;padding:12px 14px;margin-bottom:14px;border:1px solid rgba(0,0,0,0.1)">';
        html += '<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:#1a1a1a">RECIPE</div>';
        if (m.instructions) {
          html += '<div style="font-size:14px;line-height:1.6;white-space:pre-wrap;color:#1a1a1a">' + esc(m.instructions) + '</div>';
        }
        html += '</div>';
      }

      if (m.notes && m.notes.length > 0) {
        html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#1a1a1a;opacity:0.7">NOTES</div>';
        var sortedNotes = m.notes.slice().sort(function(a,b) { return b.date > a.date ? 1 : -1; });
        sortedNotes.forEach(function(n) {
          html += '<div style="background:rgba(255,255,255,0.55);border-radius:8px;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.1)">';
                    html += '<div style="font-size:14px;line-height:1.6;white-space:pre-wrap;color:#1a1a1a">' + esc(n.text) + '</div>';
          html += '</div>';
        });
      }

      html += '</div>'; // end meal-inner
    }
    html += '</div>';
  });
  list.innerHTML = html;
}

function toggleMeal(id) {
  openMeals[id] = !openMeals[id];
  saveOpenState();
  render();
}

function addRecipe(id) {
  var m = data.meals.find(function(x) { return x.id === id; });
  m.hasRecipe = true;
  openMeals[id] = true;
  saveOpenState();
  save(); render();
  openMealEditor(id);
}

// ── Modal open/close ─────────────────────────────────────────────────────────
var _mousedownOnBackdrop = false;

document.getElementById('modal-bg').addEventListener('mousedown', function(e) {
  _mousedownOnBackdrop = (e.target === this);
});

document.getElementById('modal-bg').addEventListener('mouseup', function(e) {
  if (_mousedownOnBackdrop && e.target === this) closeModal();
  _mousedownOnBackdrop = false;
});

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function openModal(html, focusId) {
  var inner = document.getElementById('modal-inner');
  inner.innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
  if (focusId) {
    setTimeout(function() {
      var el = document.getElementById(focusId);
      if (el) el.focus();
    }, 50);
  }
}

// ── Unified meal editor modal ────────────────────────────────────────────────
function openMealEditor(id) {
  var m = data.meals.find(function(x) { return x.id === id; });
  currentTags = (m.ingredients || []).slice();

  var blackBtnS = 'font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer;border:none;background:#1a1a1a;color:#fff;text-transform:uppercase';
  var hasPhoto = !!m.photo;
  var hasIngredients = m.ingredients && m.ingredients.length > 0;
  var hasRecipe = !!m.hasRecipe;
  var hasNotes = m.notes && m.notes.length > 0;

  var html = '<h3>' + esc(m.name) + '</h3><div class="modal-scroll">';

  // Name
  html += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px">';
  html += '<div class="field" style="margin-bottom:0"><label>Meal Name</label><input id="ed-name" type="text" class="meal-name-input" value="' + esc(m.name) + '"></div>';
  html += '</div>';

  // Photo — compact if no photo
  html += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px">';
  html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#333;display:flex;align-items:center;justify-content:space-between">PHOTO';
  if (hasPhoto) html += '<button style="' + blackBtnS + '" onclick="removePhotoInEditor(' + id + ')">REMOVE PHOTO</button>';
  html += '</div>';
  html += '<div class="upload-zone" onclick="document.getElementById(\'ed-pfi\').click()" style="padding:0.75rem">';
  html += '<input type="file" id="ed-pfi" accept="image/*" onchange="handlePhotoInEditor(' + id + ', this)">';
  if (hasPhoto) {
    html += '<img src="' + esc(m.photo) + '" style="max-width:100%;max-height:150px;object-fit:contain;display:block;margin:0 auto 6px auto;border-radius:6px">';
    html += '<div style="font-size:12px;color:#888">Click to change photo</div>';
  } else {
    html += '<div style="font-size:12px;color:#aaa">Click to add a photo</div>';
  }
  html += '</div></div>';

  // Ingredients
  html += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px">';
  html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#333">INGREDIENTS</div>';
  html += '<div class="field" style="margin-bottom:8px"><label>Cronometer Date</label><input id="ed-cron-date" type="date" value="' + (m.cronDate || '') + '"></div>';
  html += '<div class="field" style="margin-bottom:0"><label>Ingredients</label>' + buildTagInputHTML() + '</div>';
  html += '</div>';

  // Recipe — always show, compact min-height
  html += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px">';
  html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#333">RECIPE</div>';
  html += '<div class="field" style="margin-bottom:0"><textarea id="ed-ins" style="width:100%;font-size:14px;padding:8px;border:1px solid #ccc;border-radius:8px;font-family:inherit;resize:vertical;min-height:44px">' + esc(m.instructions || '') + '</textarea></div>';
  html += '</div>';

  // Notes — show existing, plus inline add-note row
  html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#333">NOTES</div>';
  if (hasNotes) {
    var sorted = m.notes.slice().sort(function(a,b){ return b.date > a.date ? 1 : -1; });
    sorted.forEach(function(n) {
      html += '<div style="background:#f8f8f8;border:1px solid #ddd;border-radius:8px;padding:10px 12px;margin-bottom:8px">';
      html += '<textarea onchange="updateNoteText(' + id + ',' + n.id + ',this.value)" style="width:100%;font-size:13px;padding:6px;border:1px solid #ccc;border-radius:6px;resize:vertical;min-height:44px;font-family:inherit">' + esc(n.text) + '</textarea>';
      html += '</div>';
    });
  }
  html += '<div style="background:#f8f8f8;border:1px dashed #ccc;border-radius:8px;padding:10px 12px;margin-bottom:8px">';
  html += '<div style="font-size:11px;font-weight:700;color:#999;margin-bottom:6px">ADD NOTE</div>';
    html += '<textarea id="ed-note-text" placeholder="Note text..." style="width:100%;font-size:13px;padding:6px;border:1px solid #ccc;border-radius:6px;resize:vertical;min-height:44px;font-family:inherit;display:block;margin-top:4px"></textarea>';
  html += '</div>';

  html += '</div>'; // end modal-scroll

  html += '<div class="modal-actions"><button class="btn-delete-meal" onclick="deleteMealFromEditor(' + id + ')">DELETE MEAL</button><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="submitMealEditor(' + id + ')">Save</button></div>';
  openModal(html, 'ed-name');
  renderTags();
}

function submitMealEditor(id) {
  addTagFromInput();
  var name = document.getElementById('ed-name').value.trim();
  if (!name) { alert('Please enter a meal name.'); return; }
  var m = data.meals.find(function(x) { return x.id === id; });
  m.name = name;
  m.cronDate = document.getElementById('ed-cron-date').value;
  m.ingredients = currentTags.slice();
  var ins = document.getElementById('ed-ins').value;
  m.instructions = ins;
  m.hasRecipe = !!(ins.trim());
    var noteText = (document.getElementById("ed-note-text").value || "").trim();
  if (noteText) { if (!m.notes) m.notes = []; m.notes.push({id: data.nextEntryId++, date: today(), text: noteText}); }
  save(); closeModal(); render();
}

function handlePhotoInEditor(id, input) {
  var file = input.files[0];
  if (!file) return;
  compressImage(file, function(compressed) {
    data.meals.find(function(x) { return x.id === id; }).photo = compressed;
    save(); openMealEditor(id);
  });
}

function removePhotoInEditor(id) {
  data.meals.find(function(x) { return x.id === id; }).photo = '';
  save(); openMealEditor(id);
}

function deleteMealFromEditor(id) {
  var m = data.meals.find(function(x) { return x.id === id; });
  if (!confirm('Delete "' + m.name + '" and all its data?')) return;
  data.meals = data.meals.filter(function(x) { return x.id !== id; });
  delete openMeals[id];
  saveOpenState();
  save(); closeModal(); render();
}

function updateNoteDate(mealId, noteId, val) {
  var m = data.meals.find(function(x) { return x.id === mealId; });
  var n = m.notes.find(function(x) { return x.id === noteId; });
  if (n) { n.date = val; save(); }
}

function updateNoteText(mealId, noteId, val) {
  var m = data.meals.find(function(x) { return x.id === mealId; });
  var n = m.notes.find(function(x) { return x.id === noteId; });
  if (n) { n.text = val; save(); }
}

// ── Add Meal modal ───────────────────────────────────────────────────────────
function openAddMeal() {
  currentTags = [];
  var html = '<h3>New Meal</h3><div class="modal-scroll">';
  html += '<div class="field"><label>Meal Name</label><input id="m-name" type="text" class="meal-name-input" placeholder="e.g. Lentil Soup"></div>';
  html += '<div class="field"><label>Cronometer Date</label><input id="m-date" type="date" value="' + today() + '"></div>';
  html += '<div class="field"><label>Ingredients</label>' + buildTagInputHTML() + '</div>';
  html += '<div class="field"><label>Recipe</label><textarea id="m-ins" style="width:100%;font-size:14px;padding:8px;border:1px solid #ccc;border-radius:8px;font-family:inherit;resize:vertical;min-height:44px"></textarea></div>';
  html += '<div class="field"><label>Notes</label>';
  html += '<div style="background:#f8f8f8;border:1px dashed #ccc;border-radius:8px;padding:10px 12px">';
  html += '<textarea id="m-note-text" placeholder="" style="width:100%;font-size:13px;padding:6px;border:1px solid #ccc;border-radius:6px;resize:vertical;min-height:44px;font-family:inherit;display:block;margin-top:6px"></textarea>';
  html += '</div></div>';
  html += '</div>';
  html += '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="submitAddMeal()">Add Meal</button></div>';
  openModal(html, 'm-name');
  renderTags();
}

function submitAddMeal() {
  addTagFromInput();
  var name = document.getElementById('m-name').value.trim();
  var date = document.getElementById('m-date').value;
  var ins = document.getElementById('m-ins').value;
  if (!name) { alert('Please enter a meal name.'); return; }
  var meal = {
    id: data.nextMealId++,
    name: name,
    instructions: ins,
    hasRecipe: !!ins,
    photo: '',
    cronDate: date,
    ingredients: currentTags.slice(),
    notes: []
  };
  var newNoteText = (document.getElementById('m-note-text').value || '').trim();
  if (newNoteText) {
    meal.notes.push({id: data.nextEntryId++, date: today(), text: newNoteText});
  }
  data.meals.push(meal);
  openMeals[meal.id] = !!(meal.ingredients.length || meal.hasRecipe || meal.notes.length);
  saveOpenState();
  save(); closeModal(); render();
}

function deleteMeal(id) {
  var m = data.meals.find(function(x) { return x.id === id; });
  if (!confirm('Delete "' + m.name + '" and all its data?')) return;
  data.meals = data.meals.filter(function(x) { return x.id !== id; });
  delete openMeals[id];
  saveOpenState();
  save(); render();
}

// ── Add Note ─────────────────────────────────────────────────────────────────
function openAddNote(mealId) {
  var html = '<h3>New Note</h3><div class="modal-scroll">';
  html += '<div class="field"><label>Date</label><input id="n-date" type="date" value="' + today() + '"></div>';
  html += '<div class="field"><label>Note</label><textarea id="n-text" placeholder="e.g. add to 300 ml water"></textarea></div>';
  html += '</div>';
  html += '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="submitAddNote(' + mealId + ')">Add Note</button></div>';
  openModal(html, 'n-date');
}

function submitAddNote(mealId) {
  var date = document.getElementById('n-date').value;
  var text = document.getElementById('n-text').value.trim();
  if (!date) { alert('Please enter a date.'); return; }
  if (!text) { alert('Please enter a note.'); return; }
  var m = data.meals.find(function(x) { return x.id === mealId; });
  if (!m.notes) m.notes = [];
  m.notes.push({id: data.nextEntryId++, date: date, text: text});
  openMeals[mealId] = true;
  saveOpenState();
  save(); closeModal(); render();
}

render();

var JBIN_URL = "https://api.jsonbin.io/v3/b/69ccad06aaba882197b2fcee";
var JBIN_KEY = "$2a$10$tpjsSaIqmjzoWXjpvpu7n.AdJJdQf8JUbDhBDfNoCC5rzN0vxDh/m";

function setSyncStatus(msg, cls) {
  var el = document.getElementById("sync-status");
  if(el) { el.textContent = msg; el.style.color = cls==="sync-ok"?"#2e7d32":cls==="sync-err"?"#c04a2a":"#b07d20"; }
}

function pushToGoogle() {
  var dataNoPhotos = JSON.parse(JSON.stringify(data));
  dataNoPhotos.meals.forEach(function(m) { m.photo = ''; });
  setSyncStatus("Saving...", "sync-pending");
  fetch(JBIN_URL, {
    method: "PUT",
    headers: {"Content-Type":"application/json","X-Master-Key":JBIN_KEY,"X-Bin-Versioning":"false"},
    body: JSON.stringify(dataNoPhotos)
  })
  .then(function(r){ return r.json(); })
  .then(function(){ setSyncStatus("Saved " + new Date().toLocaleTimeString(), "sync-ok"); })
  .catch(function(){ setSyncStatus("Save failed", "sync-err"); });
}

function pullFromGoogle() {
  setSyncStatus("Loading...", "sync-pending");
  fetch(JBIN_URL + "/latest", {method:"GET", headers:{"X-Master-Key":JBIN_KEY}})
  .then(function(r){ return r.json(); })
  .then(function(resp){
    var d = resp.record;
    if(d && d.meals){
      var existingPhotos = {};
      data.meals.forEach(function(m) { if(m.photo) existingPhotos[m.id] = m.photo; });
      data = d;
      data.meals.forEach(function(m) {
        if (!m.instructions) m.instructions = "";
        if (m.hasRecipe === undefined) m.hasRecipe = !!m.instructions;
        if (!m.ingredients) m.ingredients = [];
        if (!m.notes) m.notes = [];
        if (!m.cronDate) m.cronDate = '';
        m.photo = existingPhotos[m.id] || "";
      });
      data.meals.forEach(function(m) {
        if (openMeals[m.id] === undefined) openMeals[m.id] = false;
      });
      save();
      render();
      setSyncStatus("Loaded " + new Date().toLocaleTimeString(), "sync-ok");
    } else {
      setSyncStatus("Nothing saved yet", "sync-err");
    }
  })
  .catch(function(){ setSyncStatus("Could not connect", "sync-err"); });
}
